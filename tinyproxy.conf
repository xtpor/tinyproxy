##
## tinyproxy.conf -- tinyproxy daemon configuration file
##

# Run as non-root user
User nobody
Group nobody

# Port to listen on (will be overridden by entrypoint if needed)
Port 8888

# Listen on all interfaces
Listen 0.0.0.0

# Timeout settings
Timeout 600

# Default log level
LogLevel Info

# Max clients
MaxClients 100

# Allow from all by default (can be restricted)
Allow 0.0.0.0/0
Allow ::/0

# Disable via header
DisableViaHeader Yes

# Filter settings (disabled by default)
#Filter "/etc/tinyproxy/filter"
#FilterURLs On
#FilterExtended On
#FilterCaseSensitive On
#FilterDefaultDeny Yes

# Upstream proxy settings (disabled by default)
#Upstream http some.proxy.server:8080
#Upstream socks5 some.proxy.server:1080
#Upstream none ".example.com"